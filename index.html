<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jim Mbugua Art</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="index.html" style="text-decoration: none; color: #fff;">Jim Mbugua Art</a></div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="gallery.html" class="nav-link">Gallery</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Jim Mbugua Art</h1>
            <p class="quote">"Art is how we decorate space; Music is how we decorate time." - Jean-Michel Basquiat</p>
        </div>
    </section>

    <!-- Slideshow Section -->
    <section class="slideshow-section">
        <div class="slideshow-container">
            <div class="slide fade">
                <img src="artwork1.jpg.jpg" alt="Artwork 1">
            </div>
            <div class="slide fade">
                <img src="artwork2.jpg.jpg" alt="Artwork 2">
            </div>
            <div class="slide fade">
                <img src="artwork3.jpg.jpg" alt="Artwork 3">
            </div>
            <div class="slide fade">
                <img src="artwork4.jpg.jpg" alt="Artwork 4">
            </div>
            <div class="slide fade">
                <img src="artwork5.jpg.jpg" alt="Artwork 5">
            </div>
            <div class="slide fade">
                <img src="artwork6.jpg.jpg" alt="Artwork 6">
            </div>
            <div class="slide fade">
                <img src="artwork7.jpg.jpg" alt="Artwork 7">
            </div>
            <div class="slide fade">
                <img src="artwork8.jpg.jpg" alt="Artwork 8">
            </div>
            <div class="slide fade">
                <img src="artwork9.jpg.jpg" alt="Artwork 9">
            </div>
            <div class="slide fade">
                <img src="artwork10.jpg.jpg" alt="Artwork 10">
            </div>
            <div class="slide fade">
                <img src="artwork11.jpg.jpg" alt="Artwork 11">
            </div>
            <div class="slide fade">
                <img src="artwork12.jpg.jpg" alt="Artwork 12">
            </div>
            <div class="slide fade">
                <img src="artwork13.jpg.jpg" alt="Artwork 13">
            </div>

            <!-- Navigation arrows -->
            <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
            <a class="next" onclick="changeSlide(1)">&#10095;</a>

            <!-- Dots -->
            <div class="dots-container">
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
                <span class="dot" onclick="currentSlide(4)"></span>
                <span class="dot" onclick="currentSlide(5)"></span>
                <span class="dot" onclick="currentSlide(6)"></span>
                <span class="dot" onclick="currentSlide(7)"></span>
                <span class="dot" onclick="currentSlide(8)"></span>
                <span class="dot" onclick="currentSlide(9)"></span>
                <span class="dot" onclick="currentSlide(10)"></span>
                <span class="dot" onclick="currentSlide(11)"></span>
                <span class="dot" onclick="currentSlide(12)"></span>
                <span class="dot" onclick="currentSlide(13)"></span>
            </div>
        </div>
    </section>

    <!-- CTA Section -->
    <section class="cta-section">
        <a href="gallery.html" class="cta-button">Explore Gallery</a>
    </section>

    <footer>
        <p>&copy; 2024 Jim Mbugua Art. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
