<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Jim Mbugua Art</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="index.html" style="text-decoration: none; color: #fff;">Jim Mbugua Art</a></div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="gallery.html" class="nav-link">Gallery</a></li>
                <li><a href="sale.html" class="nav-link" style="color:#ffb400;">Sale 🔥</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Gallery Section -->
    <section class="gallery">
        <div class="container">
            <h2>Gallery</h2>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be loaded here from JavaScript -->
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightboxModal" class="lightbox-modal">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        
        <div class="lightbox-content">
            <div class="lightbox-image-container">
                <img id="lightboxImage" src="" alt="">
            </div>
            
            <div class="lightbox-info">
                <h2 id="lightboxTitle"></h2>
                <div class="lightbox-details">
                    <p><strong>Medium:</strong> <span id="lightboxMedium"></span></p>
                    <p><strong>Size:</strong> <span id="lightboxSize"></span></p>
                    <p class="lightbox-price"><strong>Price:</strong> <span id="lightboxPrice"></span></p>
                </div>
                <a id="lightboxOrderBtn" href="#" target="_blank" class="lightbox-order-button">
                    <i class="fab fa-whatsapp"></i> Order via WhatsApp
                </a>
            </div>
        </div>
        
        <!-- Navigation Arrows -->
        <a class="lightbox-prev" onclick="changeArtwork(-1)">&#10094;</a>
        <a class="lightbox-next" onclick="changeArtwork(1)">&#10095;</a>
        
        <!-- Artwork Counter -->
        <div class="lightbox-counter">
            <span id="artworkCounter"></span>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Jim Mbugua Art. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
